<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<canvas id="myChart" width="400" height="400"></canvas>


<script>
// Function to set a fixed seed for random number generation
function seededRandom(seed) {
    var x = Math.sin(seed++) * 10000;
    return x - Math.floor(x);
}

function getRandomInt(seed, min, max) {
    return Math.floor(seededRandom(seed) * (max - min + 1)) + min;
}

function shuffleArray(array, seed) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(seededRandom(seed + i) * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function calculateIQR(data) {
    data.sort((a, b) => a - b);
    const q1 = data[Math.floor((data.length / 4))];
    const q3 = data[Math.floor((data.length * (3 / 4)))];
    const iqr = q3 - q1;
    return { q1, q3, iqr };
}

function getRandomData(numPoints, numOutliers, seed) {
    let data = Array.from({ length: 20 }, (_, i) => i + 1); // Create an array of integers from 1 to 20
    data = shuffleArray(data, seed).slice(0, numPoints); // Sample without replacement

    const { q1, q3, iqr } = calculateIQR(data);
    const lowerBound = q1 - 2 * iqr;
    const upperBound = q3 + 2 * iqr;

    let points = data.map(x => ({ x, y: 0, isOutlier: false }));

    // Generate outliers within the 1.5 to 2 IQR bounds
    for (let i = 0; i < numOutliers; i++) {
        let outlier;
        if (seededRandom(seed + numPoints + i) < 0.5) {
            outlier = getRandomInt(seed + numPoints + i, Math.max(1, q1 - 2 * iqr), q1 - 1.5 * iqr);
        } else {
            outlier = getRandomInt(seed + numPoints + i, q3 + 1.5 * iqr, Math.min(20, q3 + 2 * iqr));
        }
        points.push({ x: outlier, y: 0, isOutlier: true });
    }

    return points;
}

var ctx = document.getElementById('myChart').getContext('2d');
var dataPoints = getRandomData(10, 2, 42); // Fixed seed value

var myChart = new Chart(ctx, {
    type: 'scatter',
    data: {
        datasets: [{
            data: dataPoints,
            backgroundColor: dataPoints.map(point => point.isOutlier ? 'rgb(54, 162, 235)' : 'rgb(255, 99, 132)'), // Color outliers in blue
            pointRadius: 7 // Make points larger
        }]
    },
    options: {
        plugins: {
            legend: {
                display: false // Remove dataset label
            },
            title: {
                display: false // Remove title
            },
            tooltip: {
                callbacks: {
                    label: function(context) {
                        return `x: ${context.raw.x}`; // Display only x coordinate
                    }
                }
            }
        },
        scales: {
            x: {
                type: 'linear',
                position: 'bottom',
                min: 0,
                max: 25 // Set x-axis to go up to 25
            },
            y: {
                display: false // Remove y-axis label
            }
        }
    }
});
</script>
