<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<canvas id="myChart" width="400" height="400"></canvas>

<script>
var ctx = document.getElementById('myChart').getContext('2d');

// Updated dataset with your values
var dataPoints = [
    { x: 2, y: 0, isOutlier: false },
    { x: 5, y: 0, isOutlier: false },
    { x: 7, y: 0, isOutlier: false },
    { x: 8, y: 0, isOutlier: false },
    { x: 10, y: 0, isOutlier: false },
    { x: 12, y: 0, isOutlier: false },
    { x: 15, y: 0, isOutlier: false },
    { x: 18, y: 0, isOutlier: false },
    { x: 20, y: 0, isOutlier: false },
    { x: 22, y: 0, isOutlier: false },
    { x: 25, y: 0, isOutlier: false },
    { x: 30, y: 0, isOutlier: false },
    { x: 35, y: 0, isOutlier: false },
    { x: 40, y: 0, isOutlier: false },
    { x: 55, y: 0, isOutlier: false }
];

var myChart = new Chart(ctx, {
    type: 'scatter',
    data: {
        datasets: [{
            data: dataPoints,
            backgroundColor: dataPoints.map(point => point.isOutlier ? 'rgb(54, 162, 235)' : 'rgb(255, 99, 132)'), // Color outliers in blue
            pointRadius: 7 // Make points larger
        }]
    },
    options: {
        plugins: {
            legend: {
                display: false // Remove dataset label
            },
            title: {
                display: false // Remove title
            },
            tooltip: {
                callbacks: {
                    label: function(context) {
                        return `x: ${context.raw.x}`; // Display only x coordinate
                    }
                }
            }
        },
        scales: {
            x: {
                type: 'linear',
                position: 'bottom',
                min: 0,
                max: 60 // Set x-axis to go up to 60
            },
            y: {
                display: false // Remove y-axis label
            }
        }
    }
});
</script>
