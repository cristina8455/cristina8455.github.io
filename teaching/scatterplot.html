<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<canvas id="myChart" width="400" height="400"></canvas>


<script>
// Function to set a fixed seed for random number generation
function seededRandom(seed) {
    var x = Math.sin(seed++) * 10000;
    return x - Math.floor(x);
}

function getRandomInt(seed, min, max) {
    return Math.floor(seededRandom(seed) * (max - min + 1)) + min;
}

function calculateIQR(data) {
    data.sort((a, b) => a - b);
    const q1 = data[Math.floor((data.length / 4))];
    const q3 = data[Math.floor((data.length * (3 / 4)))];
    const iqr = q3 - q1;
    return { q1, q3, iqr };
}

function getRandomData(numPoints, numOutliers, seed) {
    let data = [];
    // Generate random points
    for (let i = 0; i < numPoints; i++) {
        data.push(getRandomInt(seed + i, 0, 20));
    }

    const { q1, q3, iqr } = calculateIQR(data);
    const lowerBound = q1 - 2 * iqr;
    const upperBound = q3 + 2 * iqr;

    // Generate outliers within the 1.5 to 2 IQR bounds
    for (let i = 0; i < numOutliers; i++) {
        let outlier;
        if (seededRandom(seed + numPoints + i) < 0.5) {
            outlier = getRandomInt(seed + numPoints + i, Math.max(0, q1 - 2 * iqr), q1 - 1.5 * iqr);
        } else {
            outlier = getRandomInt(seed + numPoints + i, q3 + 1.5 * iqr, Math.min(20, q3 + 2 * iqr));
        }
        data.push(outlier);
    }

    // Stack points vertically with jitter effect
    let stackedData = {};
    data.forEach(point => {
        if (!stackedData[point]) {
            stackedData[point] = 0;
        }
        stackedData[point]++;
    });

    return Object.keys(stackedData).map((x, index) => ({
        x: parseInt(x),
        y: stackedData[x] - 1 + (Math.random() - 0.5) * 0.2 // Add jitter effect
    }));
}

var ctx = document.getElementById('myChart').getContext('2d');
var myChart = new Chart(ctx, {
    type: 'scatter',
    data: {
        datasets: [{
            data: getRandomData(10, 2, 42), // Fixed seed value
            backgroundColor: 'rgb(255, 99, 132)',
            pointRadius: 5 // Change point size
        }]
    },
    options: {
        plugins: {
            legend: {
                display: false // Remove dataset label
            },
            title: {
                display: false // Remove title
            }
        },
        scales: {
            x: {
                type: 'linear',
                position: 'bottom',
                min: 0,
                max: 40 // Adjusted to accommodate data range
            },
            y: {
                display: false // Remove y-axis label
            }
        }
    }
});
</script>
